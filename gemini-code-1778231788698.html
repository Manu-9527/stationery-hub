function calcSmoothness() {
  const grade = +document.getElementById('s_grade').value; 
  const gsm = +document.getElementById('s_gsm').value;     
  const texture = +document.getElementById('s_texture').value; 
  const purity = +document.getElementById('s_purity').value;   

  // Logic: Purity and Grade carry the most weight for a "frictionless" feel
  const score = Math.min(100, Math.max(0, (grade * 0.6) + (purity * 2.5) + gsm + texture));
  
  document.getElementById('s_score').textContent = Math.round(score);
  document.getElementById('s_bar').style.width = score + '%';
}

function handleSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.brand.toLowerCase().includes(q) ||
    p.body.toLowerCase().includes(q) || 
    p.lead.includes(q) ||
    p.bestFor.toLowerCase().includes(q)
  );
